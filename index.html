<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Hotel Management System</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <img src="logo.png" class="logo">
    <h1>Hotel Management System</h1>
</header>

<nav>
    <button onclick="showSection('booking')">Booking</button>
    <button onclick="showSection('rooms')">Rooms</button>
    <button onclick="showSection('contact')">Contact</button>
</nav>

<section id="booking" class="section">
    <h2>Room Booking</h2>
    <form id="bookingForm">
        <input type="text" placeholder="Customer Name" required>
        <input type="number" placeholder="Room Number" required>
        <input type="date" required>
        <input type="date" required>
        <button type="submit">Book Room</button>
    </form>
</section>

<section id="rooms" class="section">
    <h2>Available Rooms</h2>
    <div class="room">
        <img src="st1.jpeg">
        <p>Standard Room - ₹1000/night</p>
    </div>
    <div class="room">
        <img src="st2.jpeg">
        <p>Deluxe Room - ₹2000/night</p>
    </div>
</section>

<section id="contact" class="section">
    <h2>Contact Us</h2>
    <p>WhatsApp Support</p>
    <img src="whatsapp-logo.png" class="whatsapp">
</section>

<footer>
    <img src="cbse logo.jpg" class="footer-logo">
    <img src="cisce logo.png" class="footer-logo">
    <p>© 2025 Hotel System</p>
</footer>

<script src="script.js"></script>
</body>
</html>
